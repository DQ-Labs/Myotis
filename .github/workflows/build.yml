name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    # Nmap is no longer bundled: the app resolves a system-installed Nmap at
    # runtime (PATH / registry / Program Files). This keeps the exe small and
    # avoids Defender flagging an embedded nmap.exe. Users install Nmap (which
    # includes Npcap) separately.
    - name: Build EXE with PyInstaller
      shell: cmd
      run: |
        pyinstaller --noconfirm --onefile --windowed --uac-admin --name "Myotis" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Myotis-v1.0
        path: dist/Myotis.exe

    - name: Release Note
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/Myotis.exe
        generate_release_notes: true
